<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" fill="none" aria-labelledby="bannerTitle bannerDesc">
  <title id="bannerTitle">Marketplace data pipeline</title>
  <desc id="bannerDesc">Extract from sales channels, transform in the cloud, load into ERP</desc>
  <defs>
    <linearGradient id="flowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c81e2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- subtle frame -->
  <rect x="8" y="8" width="944" height="264" rx="18" fill="url(#cardBg)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- stage 1: Extract -->
  <g filter="url(#soft)">
    <rect x="32" y="36" width="248" height="128" rx="14" fill="#fff" stroke="#e2e8f0"/>
  </g>
  <text x="156" y="64" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#c81e2e">EXTRACT</text>
  <text x="156" y="84" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" fill="#64748b">Sales channels</text>
  <!-- cloud icon -->
  <path d="M116 108c0-12 10-22 22-22 2 0 4 0 6 1 4-14 17-24 32-24 17 0 31 12 34 28 10 2 17 11 17 22 0 13-10 23-23 23h-74c-13 0-24-11-24-28z" stroke="#0f172a" stroke-width="2" fill="#f8fafc"/>

  <!-- arrow 1 -->
  <path d="M296 100h52" stroke="url(#flowLine)" stroke-width="3" stroke-linecap="round"/>
  <path d="M342 94l12 6-12 6v-12z" fill="#c81e2e"/>

  <!-- stage 2: Transform -->
  <g filter="url(#soft)">
    <rect x="356" y="36" width="248" height="128" rx="14" fill="#fff" stroke="#e2e8f0"/>
  </g>
  <text x="480" y="64" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#c81e2e">TRANSFORM</text>
  <text x="480" y="84" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" fill="#64748b">Validate ¯ map ¯ schedule</text>
  <!-- gears simplified -->
  <circle cx="452" cy="112" r="18" stroke="#0f172a" stroke-width="2" fill="#fff"/>
  <circle cx="452" cy="112" r="6" fill="#e2e8f0"/>
  <circle cx="508" cy="112" r="18" stroke="#0f172a" stroke-width="2" fill="#fff"/>
  <circle cx="508" cy="112" r="6" fill="#e2e8f0"/>
  <path d="M470 112h20" stroke="#94a3b8" stroke-width="2"/>

  <!-- arrow 2 -->
  <path d="M628 100h52" stroke="url(#flowLine)" stroke-width="3" stroke-linecap="round"/>
  <path d="M674 94l12 6-12 6v-12z" fill="#c81e2e"/>

  <!-- stage 3: Load -->
  <g filter="url(#soft)">
    <rect x="680" y="36" width="248" height="128" rx="14" fill="#fff" stroke="#e2e8f0"/>
  </g>
  <text x="804" y="64" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#c81e2e">LOAD</text>
  <text x="804" y="84" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" fill="#64748b">ERP ¯ finance ¯ BI</text>
  <!-- server stack -->
  <rect x="756" y="96" width="96" height="22" rx="4" stroke="#0f172a" stroke-width="2" fill="#f8fafc"/>
  <rect x="756" y="124" width="96" height="22" rx="4" stroke="#0f172a" stroke-width="2" fill="#f1f5f9"/>
  <rect x="768" y="102" width="28" height="10" rx="2" fill="#c81e2e" opacity="0.85"/>
  <rect x="768" y="130" width="20" height="10" rx="2" fill="#64748b"/>

  <!-- platform strip: uniform wordmarks as badges -->
  <text x="480" y="198" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="700" fill="#64748b" letter-spacing="0.14em">CONNECTED SALES CHANNELS</text>
  <g font-family="system-ui,Segoe UI,sans-serif" font-size="12" font-weight="600">
    <rect x="40" y="212" width="78" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="79" y="231" text-anchor="middle" fill="#0f172a">Amazon</text>
    <rect x="128" y="212" width="84" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="170" y="231" text-anchor="middle" fill="#0f172a">Walmart</text>
    <rect x="222" y="212" width="58" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="251" y="231" text-anchor="middle" fill="#0f172a">eBay</text>
    <rect x="290" y="212" width="74" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="327" y="231" text-anchor="middle" fill="#0f172a">Shopify</text>
    <rect x="374" y="212" width="58" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="403" y="231" text-anchor="middle" fill="#0f172a">Etsy</text>
    <rect x="442" y="212" width="74" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="479" y="231" text-anchor="middle" fill="#0f172a">Wayfair</text>
    <rect x="526" y="212" width="104" height="30" rx="8" fill="#fff" stroke="#cbd5e1"/>
    <text x="578" y="231" text-anchor="middle" fill="#0f172a">+ many more</text>
    <rect x="642" y="212" width="278" height="30" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="5 4"/>
    <text x="781" y="231" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">ERP · GL · warehouse · BI</text>
  </g>
</svg>
