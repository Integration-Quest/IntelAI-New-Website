<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3d66"/>
      <stop offset="100%" stop-color="#2e6fb3"/>
    </linearGradient>

    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#79a7e6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c7ddff" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="normal"/>
    </filter>

    <!-- Common badge style -->
    <radialGradient id="badgeGrad" cx="30%" cy="30%" r="100%">
      <stop offset="0%" stop-color="#e6f0ff"/>
      <stop offset="100%" stop-color="#9cc0ff"/>
    </radialGradient>

    <style>
      .fadeIn { animation: fadeIn 1.2s ease-out both; }
      .float { animation: float 6s ease-in-out infinite; }
      .pulse { animation: pulse 3.6s ease-in-out infinite; }
      .dashPulse { animation: dash 8s linear infinite; }
      .zoomSoft { animation: zoomSoft 8s ease-in-out infinite; transform-origin: center; }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: none;} }
      @keyframes float { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-6px);} }
      @keyframes pulse { 0%,100% { opacity: 0.6;} 50% { opacity: 1;} }
      @keyframes dash { 0% { stroke-dashoffset: 0;} 100% { stroke-dashoffset: -1000;} }
      @keyframes zoomSoft { 0%,100% { transform: scale(1);} 50% { transform: scale(1.03);} }
      @keyframes barGrow { 0% { height: 8px; y: 0;} 50% { height: 28px; y: -20;} 100% { height: 8px; y: 0;} }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <!-- Decorative soft waves -->
  <g opacity="0.55" filter="url(#soft)">
    <path d="M-100,820 C240,740 430,880 780,820 C1100,760 1280,860 1650,780 L1650,1100 L-100,1100 Z" fill="url(#wave)"/>
    <path d="M-100,680 C240,600 460,730 780,680 C1100,630 1320,710 1650,640 L1650,1100 L-100,1100 Z" fill="url(#wave)" opacity="0.7"/>
    <path d="M-100,540 C260,480 470,600 820,540 C1120,490 1380,560 1650,520 L1650,1100 L-100,1100 Z" fill="url(#wave)" opacity="0.5"/>
  </g>

  <!-- Left badges (marketplaces) -->
  <g id="sources" transform="translate(130, 240)" class="fadeIn">
    <!-- Amazon (A) -->
    <g transform="translate(0,0)" class="float">
      <circle r="44" cx="0" cy="0" fill="url(#badgeGrad)"/>
      <text x="0" y="6" text-anchor="middle" font-family="Inter, system-ui, Arial" font-size="36" fill="#0f3d66">A</text>
    </g>
    <!-- Walmart (W) -->
    <g transform="translate(0,160)" class="float" style="animation-delay: .3s">
      <circle r="44" cx="0" cy="0" fill="url(#badgeGrad)"/>
      <text x="0" y="6" text-anchor="middle" font-family="Inter, system-ui, Arial" font-size="36" fill="#0f3d66">W</text>
    </g>
    <!-- Shopify (S) -->
    <g transform="translate(0,320)" class="float" style="animation-delay: .6s">
      <circle r="44" cx="0" cy="0" fill="url(#badgeGrad)"/>
      <text x="0" y="6" text-anchor="middle" font-family="Inter, system-ui, Arial" font-size="36" fill="#0f3d66">S</text>
    </g>
    <!-- Etsy (E) -->
    <g transform="translate(0,480)" class="float" style="animation-delay: .9s">
      <circle r="44" cx="0" cy="0" fill="url(#badgeGrad)"/>
      <text x="0" y="6" text-anchor="middle" font-family="Inter, system-ui, Arial" font-size="36" fill="#0f3d66">E</text>
    </g>
  </g>

  <!-- Flow paths to cloud -->
  <g id="flows" fill="none" stroke="#b7d0ff" stroke-width="3" opacity="0.8">
    <path id="p1" d="M170,240 C420,260 600,340 760,420" stroke-linecap="round" stroke-dasharray="12 16" class="dashPulse"/>
    <path id="p2" d="M170,400 C420,420 600,470 760,520" stroke-linecap="round" stroke-dasharray="12 16" class="dashPulse" style="animation-duration: 9s"/>
    <path id="p3" d="M170,560 C420,560 620,600 760,620" stroke-linecap="round" stroke-dasharray="12 16" class="dashPulse" style="animation-duration: 10s"/>
    <path id="p4" d="M170,720 C420,700 610,710 760,720" stroke-linecap="round" stroke-dasharray="12 16" class="dashPulse" style="animation-duration: 11s"/>
  </g>

  <!-- Moving data dots -->
  <g fill="#e6f0ff">
    <circle r="6">
      <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#p1"/>
      </animateMotion>
    </circle>
    <circle r="6">
      <animateMotion dur="7s" repeatCount="indefinite" rotate="auto" begin="1s">
        <mpath href="#p2"/>
      </animateMotion>
    </circle>
    <circle r="6">
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto" begin="2s">
        <mpath href="#p3"/>
      </animateMotion>
    </circle>
    <circle r="6">
      <animateMotion dur="9s" repeatCount="indefinite" rotate="auto" begin="3s">
        <mpath href="#p4"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Cloud with analytics -->
  <g id="cloud" transform="translate(900, 480)" class="fadeIn zoomSoft">
    <path d="M-120,20 a80,70 0 0 1 60-90 a70,60 0 0 1 120,0 a70,60 0 0 1 60,80 a70,60 0 0 1 -60,70 h-160 a70,60 0 0 1 -20-60z"
          fill="#d9e7ff" stroke="#b7ccf3" stroke-width="2"/>
    <!-- Mini bar chart inside cloud -->
    <g transform="translate(-20,20)">
      <rect x="-40" y="0" width="16" height="8" fill="#4c79c4">
        <animate attributeName="height" values="10;28;10" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="0;-18;0" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="-16" y="0" width="16" height="8" fill="#3768b8">
        <animate attributeName="height" values="14;36;14" dur="3.2s" repeatCount="indefinite" begin=".2s"/>
        <animate attributeName="y" values="0;-22;0" dur="3.2s" repeatCount="indefinite" begin=".2s"/>
      </rect>
      <rect x="8" y="0" width="16" height="8" fill="#2c5da8">
        <animate attributeName="height" values="8;24;8" dur="3.6s" repeatCount="indefinite" begin=".4s"/>
        <animate attributeName="y" values="0;-16;0" dur="3.6s" repeatCount="indefinite" begin=".4s"/>
      </rect>
      <polyline points="-48,-10 -8,-26 28,-14" fill="none" stroke="#2a5699" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="points" dur="4s" repeatCount="indefinite"
          values="-48,-10 -8,-26 28,-14; -48,-8 -8,-16 28,-24; -48,-10 -8,-26 28,-14"/>
      </polyline>
    </g>
  </g>

  <!-- NetSuite block -->
  <g id="netsuite" transform="translate(1100, 490)" class="fadeIn">
    <rect x="-10" y="-30" rx="8" ry="8" width="44" height="60" fill="#e0ecff" stroke="#b7ccf3" stroke-width="2"/>
    <path d="M-4,-16 L18,-16 L18,16 L-4,16 Z M2,-10 L12,-10 L12,10 L2,10 Z" fill="#2e5faa"/>
  </g>

  <!-- Flow from cloud to dashboard -->
  <path id="p5" d="M980,540 C1120,560 1230,540 1310,520" fill="none" stroke="#b7d0ff" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="12 16" class="dashPulse" style="animation-duration: 9s"/>
  <circle r="6" fill="#e6f0ff">
    <animateMotion dur="7s" repeatCount="indefinite" rotate="auto" begin="1s">
      <mpath href="#p5"/>
    </animateMotion>
  </circle>

  <!-- Dashboard card -->
  <g id="dashboard" transform="translate(1340, 480)" class="fadeIn">
    <rect x="-110" y="-70" width="220" height="140" rx="16" ry="16" fill="#eaf2ff" stroke="#b7ccf3" stroke-width="2"/>
    <!-- Header -->
    <rect x="-94" y="-52" width="80" height="10" rx="5" fill="#9fbaf0" class="pulse"/>
    <!-- Pie -->
    <g transform="translate(-58,10)" class="zoomSoft">
      <circle r="26" cx="0" cy="0" fill="#d7e6ff"/>
      <path d="M0,0 L26,0 A26,26 0 0 1 -13,22 Z" fill="#6b92d6">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="12s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Bars -->
    <g transform="translate(30,-20)">
      <rect x="-20" y="30" width="12" height="12" fill="#7fa2e0">
        <animate attributeName="height" values="12;40;12" dur="3.8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="30;2;30" dur="3.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="30" width="12" height="12" fill="#688fd1">
        <animate attributeName="height" values="20;48;20" dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="22;0;22" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="20" y="30" width="12" height="12" fill="#557ec7">
        <animate attributeName="height" values="16;36;16" dur="3.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="26;6;26" dur="3.2s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- Sparkline -->
    <polyline points="-70,30 -30,20 10,26 40,14 80,18" fill="none" stroke="#3b6fbe" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="points" dur="5s" repeatCount="indefinite"
        values="-70,30 -30,20 10,26 40,14 80,18; -70,26 -30,14 10,30 40,18 80,12; -70,30 -30,20 10,26 40,14 80,18"/>
    </polyline>
  </g>
</svg>
